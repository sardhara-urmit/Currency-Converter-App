<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header ><h1 class="head">convert Any Currency</h1></header>
    <nav></nav>
    <main class="main">

        <section class="from">

         <form action="">
             <!-- <p class="p">from</p> -->
             <img src="https://flagsapi.com/US/flat/64.png" alt="flag" class="img">
             <select name="from" id="" class="ch">
                 <option value="us" selected>US</option>
                 <option value="ind">IND</option>
             </select>
             <p class="p">Enter Ammount</p>
             <input type="number" value="100">
         </form>

        </section>
        <button class="hd">to convert</button>
        <section class="to">
             <form action="">
            
            <!-- <p class="p">from</p> -->
            <img src="https://flagsapi.com/IN/flat/64.png" alt="flag" class="img">
            <select name="to" id="" class="ch">
                <option value="us">US</option>
                <option value="ind" selected>IND</option>
                </select>
             <p class="p"> Ammount Is </p>
             <input type="number" value="100">  
         </form>

        </section>

    </main>
    <script src="app.js"></script>
</body>
</html>
